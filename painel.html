async function abrirRanking() {
  const main = document.getElementById("conteudo-principal");

  // Ordena todos os registros do histórico global
  // Primeiro pelo nome do App, depois pelo número de acertos
  const rankingOrdenado = [...historicoGlobal].sort((a, b) => {
    if (a.app !== b.app) return a.app.localeCompare(b.app);
    return b.acertos - a.acertos || a.tempo_segundos - b.tempo_segundos;
  });

  let html = `
    <div class="titulo"><h1>🏆 Ranking Geral</h1></div>
    <div class="historico-box">
      <table>
        <thead>
          <tr>
            <th>Posição</th>
            <th>Jogo/Modo</th>
            <th>Usuário</th>
            <th>Acertos</th>
            <th>Tempo</th>
          </tr>
        </thead>
        <tbody>
          ${rankingOrdenado.map((item, index) => {
            // Lógica simples de destaque (pode personalizar no CSS)
            let classeCss = "";
            if (index === 0) classeCss = "ranking-ouro";
            else if (index === 1) classeCss = "ranking-prata";
            else if (index === 2) classeCss = "ranking-bronze";

            return `
              <tr class="${classeCss}">
                <td>${index + 1}º</td>
                <td>${item.app.toUpperCase()}</td>
                <td>${item.users?.nome || "Músico"}</td>
                <td>${item.acertos}</td>
                <td>${formatarTempo(item.tempo_segundos)}</td>
              </tr>
            `;
          }).join("")}
        </tbody>
      </table>
    </div>
  `;
  main.innerHTML = html;
}

    function abrirPagina(nomeApp) {
  const main = document.getElementById("conteudo-principal");
  const dados = historicoGlobal.filter((item) => item.app === nomeApp);

  // 1. Lógica para encontrar o registro recordista
  let melhorPartida = null;

  dados.forEach((item) => {
    if (!melhorPartida) {
      melhorPartida = item;
      return;
    }

    // Prioridade 1: Mais acertos é melhor
    if ((item.acertos || 0) > (melhorPartida.acertos || 0)) {
      melhorPartida = item;
    } 
    // Prioridade 2: Se acertos forem iguais, menor tempo é melhor
    else if ((item.acertos || 0) === (melhorPartida.acertos || 0)) {
      if (item.tempo_segundos < melhorPartida.tempo_segundos) {
        melhorPartida = item;
      }
    }
  });

  const nomesBonitos = {
    notas: "Notas no Braço do Instrumento",
    intervalos: "Intervalos",
  };

  const tituloBonito = nomesBonitos[nomeApp] || nomeApp;
  const ultimaJogada = dados[0];

  main.innerHTML = `
      <div class="titulo">
          <h1>${tituloBonito}</h1>
      </div>

      <div class="cards-topo">
          <div class="info-card">
              <span>🏆 Seu Recorde</span>
              <h2>
                  ${melhorPartida ? formatarTempo(melhorPartida.tempo_segundos) : "--:--"}
              </h2>
              <small style="color: #94a3b8;">${melhorPartida ? melhorPartida.acertos + " acertos" : "0 acertos"}</small>
          </div>

          <div class="info-card">
              <span>🎮 Partidas Jogadas</span>
              <h2>${dados.length}</h2>
          </div>

          <div class="info-card">
              <span>📅 Última Tentativa</span>
              <h2 style="font-size:20px;">
                  ${
                    ultimaJogada
                      ? new Date(ultimaJogada.created_at).toLocaleDateString("pt-BR")
                      : "--"
                  }
              </h2>
          </div>
      </div>

      <div class="historico-box">
          <div class="historico-topo">
              <h2>Histórico</h2>
          </div>
          ${
            dados.length === 0
              ? `<div class="vazio">Nenhuma partida encontrada.</div>`
              : `
              <table>
                  <thead>
                      <tr>
                          <th>Data</th>
                          <th>Acertos</th>
                          <th>Erros</th>
                          <th>Tempo</th>
                      </tr>
                  </thead>
                  <tbody>
                      ${dados
                        .map((item) => {
                          // Destaque se for o recorde (mesma lógica usada no loop acima)
                          const ehRecorde = melhorPartida && 
                                            item.acertos === melhorPartida.acertos && 
                                            item.tempo_segundos === melhorPartida.tempo_segundos;
                          
                          const classeDestaque = ehRecorde ? 'class="linha-destaque"' : "";

                          return `
                          <tr ${classeDestaque}>
                              <td>${new Date(item.created_at).toLocaleDateString("pt-BR")}</td>
                              <td>${item.acertos || 0}</td>
                              <td>${item.erros || 0}</td>
                              <td>${formatarTempo(item.tempo_segundos)}</td>
                          </tr>
                          `;
                        })
                        .join("")}
                  </tbody>
              </table>
              `
          }
      </div>
      <br><br>
      <div class="apps">
        <a href="notas_instrumento.html" class="btn btnnotas">🎸 Notas no braco do instrumento</a>
        <a href="intervalos.html" class="btn btn-intervalos">
            <span class="silaba">🎵</span> <span class="silaba">in</span><span class="silaba">ter</span><span class="silaba">valos</span>
        </a>
      </div>
  `;
}

      async function abrirHistoricoUsuarios() {
        const main = document.getElementById("conteudo-principal");

        const { data: usuarios, error: erroUsers } = await supabaseClient
          .from("users")
          .select("*");

        const { data: historico, error: erroHistorico } = await supabaseClient
          .from("historico_jogadas")
          .select("*");

        if (erroUsers || erroHistorico) {
          console.error(erroUsers || erroHistorico);
          return;
        }

        let html = ` <div class="titulo"><h1>📊 Histórico dos Usuários</h1></div><div class="historico-box"><table><thead><tr><th>Usuário</th><th>App</th><th>Partidas</th><th>Melhor Tempo</th><th>Acertos (no recorde)</th></tr></thead><tbody>`;

        usuarios.forEach((user) => {
          const jogosUsuario = historico.filter(
            (h) => h.identificador === user.id,
          );
          const apps = [...new Set(jogosUsuario.map((j) => j.app))];

          apps.forEach((app) => {
            const jogosApp = jogosUsuario.filter((j) => j.app === app);

            // Encontra a partida com o menor tempo (melhor tempo)
            const melhorPartida = jogosApp.reduce((prev, curr) => {
              return curr.tempo_segundos < prev.tempo_segundos ? curr : prev;
            });

            html += ` <tr>
                              <td>${user.nome || "---"}</td>
                              <td>${app}</td>
                              <td>${jogosApp.length}</td>
                              <td>${formatarTempo(melhorPartida.tempo_segundos)}</td>
                              <td>${melhorPartida.acertos || 0}</td>
                          </tr> `;
          });
        });

        html += `</tbody></table></div>`;
        main.innerHTML = html;
      }

      async function salvarConfiguracoes() {
        const novoNome = document.getElementById("novo-nome").value;

        const novoEmail = document.getElementById("novo-email").value;

        const novaSenha = document.getElementById("nova-senha").value;

        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        if (!session?.user) return;

        const userId = session.user.id;

        // ====================================
        // UPDATE AUTH
        // ====================================

        const updateData = {};

        if (novoEmail !== session.user.email) {
          updateData.email = novoEmail;
        }

        if (novaSenha.length >= 6) {
          updateData.password = novaSenha;
        }

        if (Object.keys(updateData).length > 0) {
          const { error: authError } =
            await supabaseClient.auth.updateUser(updateData);

          if (authError) {
            console.error(authError);
            alert(authError.message);
            return;
          }
        }

        // ====================================
        // UPDATE TABELA USERS
        // ====================================

        const { error: userError } = await supabaseClient
          .from("users")
          .update({
            nome: novoNome,
            email: novoEmail,
          })
          .eq("id", userId);

        if (userError) {
          console.error(userError);
          alert("Erro ao atualizar dados.");
          return;
        }

        alert("Dados atualizados com sucesso!");

        window.location.reload();
      }
      async function salvarPlano(userId) {
        const elementoPlano = document.getElementById(`plano-${userId}`);

        if (!elementoPlano) {
          mostrarToast("Erro: Elemento não encontrado.", "vermelho");
          return;
        }

        const novoPlano = elementoPlano.value;

        const { error } = await supabaseClient
          .from("users")
          .update({ tipo_acesso: novoPlano })
          .eq("id", userId);

        if (error) {
          console.error(error);
          mostrarToast(
            "Erro ao salvar alteração: " + error.message,
            "vermelho",
          );
          return;
        }

        mostrarToast("Plano atualizado com sucesso!", "verde");
        abrirUsuarios();
      }

    function formatarTempo(segundos) {
    if (!segundos || isNaN(segundos)) return "--:--";

    // 1. Calcula minutos totais
    const minutos = Math.floor(segundos / 60)
        .toString()
        .padStart(2, "0");

    // 2. Calcula segundos inteiros (o que sobra após tirar os minutos)
    const segundosInteiros = Math.floor(segundos % 60);

    // 3. Calcula os centésimos (pega o resto da divisão por 1, multiplica por 100 e arredonda)
    const centesimos = Math.round((segundos % 1) * 100);

    // 4. Formata tudo com preenchimento de zero à esquerda
    const segFormatado = segundosInteiros.toString().padStart(2, "0");
    const centFormatado = centesimos.toString().padStart(2, "0");

    return `${minutos}:${segFormatado}.${centFormatado}`;
}

      function mostrarToast(mensagem, tipo = "verde") {
        const container = document.getElementById("toast-container");
        const div = document.createElement("div");

        // Mapeia o tipo para a classe CSS
        const classes = {
          verde: "toast toast-verde",
          vermelho: "toast toast-vermelho",
          amarelo: "toast toast-amarelo",
        };

        div.className = classes[tipo] || classes["verde"];
        div.innerText = mensagem;

        container.appendChild(div);

        // Remove após 3 segundos
        setTimeout(() => {
          div.remove();
        }, 3000);
      }
