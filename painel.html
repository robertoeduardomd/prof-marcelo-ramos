<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div id="toast-container"></div>
    <aside class="sidebar">
      <div class="perfil">
        <h2 id="nome-usuario">Carregando...</h2>
        <p id="plano-usuario">Carregando plano...</p>
      </div>
      <button class="menu-btn" onclick="abrirConfiguracoes()">👤 Perfil</button
      ><button class="menu-btn" onclick="abrirPagina('notas')">
        🎼 Notas no Instrumento</button
      ><button class="menu-btn" onclick="abrirPagina('intervalos')">
        🎵 Intervalos
      </button>
      <button class="menu-btn" onclick="abrirRanking('notas')">
        🥇 Ranking Notas
      </button>
      <button class="menu-btn" onclick="abrirRanking('intervalos')">
        🥇 Ranking Intervalos
      </button>
      <div id="txt_adm" style="display: none; text-align: center">
        Configurações de admin:
      </div>
      <button
        class="menu-btn"
        id="btn-admin"
        style="display: none"
        onclick="abrirUsuarios()"
      >
        👥Planos de Usuários</button
      ><button
        class="menu-btn"
        id="btn-historico"
        style="display: none"
        onclick="abrirHistoricoUsuarios()"
      >
        📊 Histórico Usuários</button
      ><button class="menu-btn sair" id="btn-sair">🚪 Sair</button>
    </aside>
    <main class="main" id="conteudo-principal">
      <div class="titulo"><h1>Dashboard</h1></div>
    </main>
    <script>
      const EMAIL_ADMIN = "marcelo@seusite.com";

      let usuarioAtual = null;
      let historicoGlobal = [];

      // ======================================================
      // LOAD
      // ======================================================

      window.onload = async () => {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        if (!session || !session.user) {
          window.location.href = "index.html";
          return;
        }

        usuarioAtual = session.user;
        console.log("USUARIO AUTH:", usuarioAtual);
        console.log("ID:", usuarioAtual.id);
        console.log("EMAIL:", usuarioAtual.email);
        // ==================================================
        // PEGA NOME REAL DA TABELA USERS
        // ==================================================

        const { data: userTable } = await supabaseClient
          .from("users")
          .select("nome, tipo_acesso, is_admin")
          .eq("id", usuarioAtual.id)
          .maybeSingle();
        const nomeFinal =
          userTable?.nome ||
          usuarioAtual.user_metadata?.display_name ||
          usuarioAtual.email.split("@")[0] ||
          "Músico";

        document.getElementById("nome-usuario").innerText = `Olá, ${nomeFinal}`;
        const plano = userTable?.tipo_acesso || "free";

        document.getElementById("plano-usuario").innerText = `Plano: ${plano}`;
        // ==================================================
        // ADMIN
        // ==================================================

        console.log("USER TABLE:", userTable);
        console.log("IS ADMIN:", userTable?.is_admin);

        if (userTable?.is_admin === true) {
          document.getElementById("txt_adm").style.display = "block";
          document.getElementById("btn-admin").style.display = "block";
          document.getElementById("btn-historico").style.display = "block";
        }

        // ==================================================
        // LOGOUT
        // ==================================================

        document.getElementById("btn-sair").onclick = async () => {
          await supabaseClient.auth.signOut();

          window.location.href = "index.html";
        };

        // ==================================================
        // HISTÓRICO
        // ==================================================

        // Substitua o bloco de histórico no seu window.onload por este:
        const { data, error } = await supabaseClient
          .from("historico_jogadas")
          .select("*")
          .order("acertos", { ascending: false })
          .order("tempo_segundos", { ascending: true });

        if (error) {
          console.error("Erro ao buscar histórico:", error);
          return;
        }

        historicoGlobal = data || [];
        console.log("Histórico carregado:", historicoGlobal); // Veja no F12 se o array está vazio ou preenchido

        // Apenas chama se houver dados ou garante que a tela abra mesmo vazia
        abrirPagina("notas");
      };

      async function abrirRanking(nomeApp) {
        const main = document.getElementById("conteudo-principal");

        // 1. Títulos e Filtros
        const nomesBonitos = {
          notas: "Notas no Braço do instrumento",
          intervalos: "Intervalos",
        };

        main.innerHTML = `
    <div class="titulo"><h1>🥇 Ranking: ${nomesBonitos[nomeApp]}</h1></div>
    <div class="filtros" style="display:flex; justify-content:flex-end; margin-bottom:20px;">
       <select id="filtro-modo" onchange="filtrarRanking('${nomeApp}')">
          <option value="todos">Todos os Modos</option>
          </select>
    </div>
    <div id="tabela-ranking" class="historico-box"></div>
  `;

        // 2. Busca dados do app selecionado
        const { data, error } = await supabaseClient
          .from("historico_jogadas")
          .select("*, users(nome)")
          .eq("app", nomeApp)
          .order("acertos", { ascending: false })
          .order("tempo_segundos", { ascending: true });

        if (error) {
          console.error(error);
          return;
        }

        // 3. Preencher o Select com os modos únicos encontrados
        const select = document.getElementById("filtro-modo");
        const modos = [
          ...new Set(data.map((item) => item.modo_jogo).filter(Boolean)),
        ];
        modos.forEach((modo) => {
          select.innerHTML += `<option value="${modo}">${modo}</option>`;
        });

        // 4. Salvar dados globalmente para o filtro funcionar depois
        window.rankingData = data;
        renderizarTabela(data);
      }

      // Função auxiliar para renderizar a tabela
      function renderizarTabela(data) {
        const container = document.getElementById("tabela-ranking");
        let html = `<table><thead><tr><th>Modo</th><th>Posição</th><th>Usuário</th><th>Acertos</th><th>Tempo</th></tr></thead><tbody>`;

        let modoAtual = "";
        let posicao = 0;

        data.forEach((item) => {
          if (item.modo_jogo !== modoAtual) {
            modoAtual = item.modo_jogo;
            posicao = 1;
          } else {
            posicao++;
          }

          html += `<tr>
      <td>${item.modo_jogo || "Geral"}</td>
      <td>${posicao}º</td>
      <td>${item.users?.nome || "Músico"}</td>
      <td>${item.acertos}</td>
      <td>${formatarTempo(item.tempo_segundos)}</td>
    </tr>`;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
      }

      // Função de Filtro
      function filtrarRanking(app) {
        const modoSelecionado = document.getElementById("filtro-modo").value;
        const dados = window.rankingData;

        if (modoSelecionado === "todos") {
          renderizarTabela(dados);
        } else {
          const filtrados = dados.filter(
            (i) => i.modo_jogo === modoSelecionado,
          );
          renderizarTabela(filtrados);
        }
      }
      // ======================================================
      // ABRIR PÁGINA
      // ======================================================

      async function abrirPagina(nomeApp) {
        const main = document.getElementById("conteudo-principal");
        main.innerHTML = `<div class="titulo"><h1>Carregando...</h1></div>`;

        // 1. Busca os dados apenas deste app para este usuário
        const { data, error } = await supabaseClient
          .from("historico_jogadas")
          .select("*")
          .eq("app", nomeApp)
          .eq("identificador", usuarioAtual.id) // Garante que só pega o do usuário
          .order("acertos", { ascending: false })
          .order("tempo_segundos", { ascending: true });

        if (error) {
          console.error("Erro ao buscar histórico:", error);
          main.innerHTML = `<div class="titulo"><h1>Erro ao carregar</h1></div>`;
          return;
        }

        const dados = data || [];

        // 2. Lógica para encontrar o recorde (agora funciona pois 'dados' está preenchido)
        let melhorPartida = dados.length > 0 ? dados[0] : null;

        // 3. Renderização
        const nomesBonitos = {
          notas: "Notas no Braço do Instrumento",
          intervalos: "Intervalos",
        };

        const tituloBonito = nomesBonitos[nomeApp] || nomeApp;
        const ultimaJogada = dados.length > 0 ? dados[0] : null;

        main.innerHTML = `
    <div class="titulo"><h1>${tituloBonito}</h1></div>
    <div class="cards-topo">
        <div class="info-card">
            <span>🏆 Seu Recorde</span>
            <h2>${melhorPartida ? formatarTempo(melhorPartida.tempo_segundos) : "--:--"}</h2>
            <small style="color: #94a3b8;">${melhorPartida ? melhorPartida.acertos + " acertos" : "0 acertos"}</small>
        </div>
        <div class="info-card">
            <span>🎮 Partidas Jogadas</span>
            <h2>${dados.length}</h2>
        </div>
        <div class="info-card">
            <span>📅 Última Tentativa</span>
            <h2 style="font-size:20px;">${ultimaJogada ? new Date(ultimaJogada.created_at).toLocaleDateString("pt-BR") : "--"}</h2>
        </div>
    </div>
    <div class="historico-box">
        <div class="historico-topo"><h2>Histórico</h2></div>
        ${
          dados.length === 0
            ? `<div class="vazio">Nenhuma partida encontrada.</div>`
            : `
        <table>
            <thead><tr><th>Data</th><th>Acertos</th><th>Erros</th><th>Tempo</th></tr></thead>
            <tbody>
                ${dados
                  .map(
                    (item) => `
                    <tr>
                        <td>${new Date(item.created_at).toLocaleDateString("pt-BR")}</td>
                        <td>${item.acertos || 0}</td>
                        <td>${item.erros || 0}</td>
                        <td>${formatarTempo(item.tempo_segundos)}</td>
                    </tr>
                `,
                  )
                  .join("")}
            </tbody>
        </table>`
        }
    </div>
  `;
      }

      // ======================================================
      // USUÁRIOS ADMIN
      // ======================================================
      async function abrirHistoricoUsuarios() {
        const main = document.getElementById("conteudo-principal");

        const { data: usuarios, error: erroUsers } = await supabaseClient
          .from("users")
          .select("*");

        const { data: historico, error: erroHistorico } = await supabaseClient
          .from("historico_jogadas")
          .select("*");

        if (erroUsers || erroHistorico) {
          console.error(erroUsers || erroHistorico);
          return;
        }

        let html = ` <div class="titulo"><h1>📊 Histórico dos Usuários</h1></div><div class="historico-box"><table><thead><tr><th>Usuário</th><th>App</th><th>Partidas</th><th>Melhor Tempo</th><th>Acertos (no recorde)</th></tr></thead><tbody>`;

        usuarios.forEach((user) => {
          const jogosUsuario = historico.filter(
            (h) => h.identificador === user.id,
          );
          const apps = [...new Set(jogosUsuario.map((j) => j.app))];

          apps.forEach((app) => {
            const jogosApp = jogosUsuario.filter((j) => j.app === app);

            // Encontra a partida com o menor tempo (melhor tempo)
            const melhorPartida = jogosApp.reduce((prev, curr) => {
              return curr.tempo_segundos < prev.tempo_segundos ? curr : prev;
            });

            html += ` <tr>
                              <td>${user.nome || "---"}</td>
                              <td>${app}</td>
                              <td>${jogosApp.length}</td>
                              <td>${formatarTempo(melhorPartida.tempo_segundos)}</td>
                              <td>${melhorPartida.acertos || 0}</td>
                          </tr> `;
          });
        });

        html += `</tbody></table></div>`;
        main.innerHTML = html;
      }

      async function abrirConfiguracoes() {
        const main = document.getElementById("conteudo-principal");

        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        if (!session?.user) return;

        const user = session.user;

        const { data: userTable } = await supabaseClient
          .from("users")
          .select("*")
          .eq("id", user.id)
          .maybeSingle();

        main.innerHTML = `

        <div class="titulo">
            <h1>⚙️ Configurações da Conta</h1>
        </div>

        <div
            style="
                background:#1e293b;
                padding:30px;
                border-radius:20px;
                border:1px solid #334155;
                max-width:700px;
            "
        >

            <div style="margin-bottom:20px;">

                <div class="campo">
                    <input
                        id="novo-nome"
                        value="${userTable?.nome || ""}"
                        required
                    /><br /><br />
                    <label for="novo-nome">Nome</label><br />
                </div>

            </div>

            <div style="margin-bottom:20px;">

                <div class="campo">
                    <input
                        id="novo-email"
                        value="${user.email}"
                        required
                    /><br /><br />
                    <label for="novo-email">Email</label><br />
                </div>

            </div>

            <div style="margin-bottom:20px;">

                <div class="campo">
                    <input id="nova-senha"
                        type="password"
                        required
                    /><br /><br />
                    <label for="nova-senha">Digite nova senha</label><br />
                </div>

            </div>

            <button
                onclick="salvarConfiguracoes()"
                style="
                    background:#2563eb;
                    color:white;
                    border:none;
                    padding:14px 20px;
                    border-radius:12px;
                    cursor:pointer;
                    font-size:16px;
                "
            >
                💾 Salvar Alterações
            </button>

        </div>
    `;
      }

      async function salvarConfiguracoes() {
        const novoNome = document.getElementById("novo-nome").value;

        const novoEmail = document.getElementById("novo-email").value;

        const novaSenha = document.getElementById("nova-senha").value;

        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        if (!session?.user) return;

        const userId = session.user.id;

        // ====================================
        // UPDATE AUTH
        // ====================================

        const updateData = {};

        if (novoEmail !== session.user.email) {
          updateData.email = novoEmail;
        }

        if (novaSenha.length >= 6) {
          updateData.password = novaSenha;
        }

        if (Object.keys(updateData).length > 0) {
          const { error: authError } =
            await supabaseClient.auth.updateUser(updateData);

          if (authError) {
            console.error(authError);
            alert(authError.message);
            return;
          }
        }

        // ====================================
        // UPDATE TABELA USERS
        // ====================================

        const { error: userError } = await supabaseClient
          .from("users")
          .update({
            nome: novoNome,
            email: novoEmail,
          })
          .eq("id", userId);

        if (userError) {
          console.error(userError);
          alert("Erro ao atualizar dados.");
          return;
        }

        alert("Dados atualizados com sucesso!");

        window.location.reload();
      }
      async function salvarPlano(userId) {
        const elementoPlano = document.getElementById(`plano-${userId}`);

        if (!elementoPlano) {
          mostrarToast("Erro: Elemento não encontrado.", "vermelho");
          return;
        }

        const novoPlano = elementoPlano.value;

        const { error } = await supabaseClient
          .from("users")
          .update({ tipo_acesso: novoPlano })
          .eq("id", userId);

        if (error) {
          console.error(error);
          mostrarToast(
            "Erro ao salvar alteração: " + error.message,
            "vermelho",
          );
          return;
        }

        mostrarToast("Plano atualizado com sucesso!", "verde");
        abrirUsuarios();
      }

      // ======================================================
      // FORMATAR TEMPO
      // ======================================================

      function formatarTempo(segundos) {
        if (segundos === null || segundos === undefined || isNaN(segundos))
          return "--:--";

        // 1. Calcula minutos totais
        const minutos = Math.floor(segundos / 60)
          .toString()
          .padStart(2, "0");

        // 2. Calcula segundos inteiros (o que sobra após tirar os minutos)
        const segundosInteiros = Math.floor(segundos % 60);

        // 3. Calcula os centésimos (pega o resto da divisão por 1, multiplica por 100 e arredonda)
        const centesimos = Math.round((segundos % 1) * 100);

        // 4. Formata tudo com preenchimento de zero à esquerda
        const segFormatado = segundosInteiros.toString().padStart(2, "0");
        const centFormatado = centesimos.toString().padStart(2, "0");

        return `${minutos}:${segFormatado}.${centFormatado}`;
      }

      function mostrarToast(mensagem, tipo = "verde") {
        const container = document.getElementById("toast-container");
        const div = document.createElement("div");

        // Mapeia o tipo para a classe CSS
        const classes = {
          verde: "toast toast-verde",
          vermelho: "toast toast-vermelho",
          amarelo: "toast toast-amarelo",
        };

        div.className = classes[tipo] || classes["verde"];
        div.innerText = mensagem;

        container.appendChild(div);

        // Remove após 3 segundos
        setTimeout(() => {
          div.remove();
        }, 3000);
      }
    </script>
  </body>
</html>
